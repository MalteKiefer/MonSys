name: mon

# NOTE: compose v2 bind-mounts preserve host permissions on files under
# ./secrets. The distroless `nonroot` user (uid 65532) used by mon-server
# must be able to read /run/secrets/db_pw. Production deployments should
# prefer docker swarm secrets (which set tmpfs perms automatically) or a
# docker-socket-proxy that adjusts ownership; bind-mounting on a single
# host requires `chown 65532 deploy/secrets/*` and mode 0600.

services:
  timescaledb:
    # digest-pinned for supply-chain integrity; refresh via dependabot or manual review
    # Resolved version unknown — pin via digest. Run 'SELECT extversion FROM pg_extension WHERE extname=''timescaledb'';' on a running container to confirm. Compatible with add_retention_policy(if_not_exists=>TRUE) since TS 2.3+.
    image: timescale/timescaledb:latest-pg16@sha256:15e00162766bd6f0019afaad4e57b850dcf882de5909bd7633899eebd4c03d57
    restart: unless-stopped
    environment:
      POSTGRES_DB: mon
      POSTGRES_USER: mon
      POSTGRES_PASSWORD_FILE: /run/secrets/db_pw
    volumes:
      - tsdb:/var/lib/postgresql/data
    secrets:
      - db_pw
    networks:
      - mon-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mon -d mon"]
      interval: 10s
      timeout: 5s
      retries: 5

  mon-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      MON_LISTEN_ADDR: ":8080"
      # dev: sslmode=disable; in prod overlay enables TLS
      MON_DSN: "postgres://mon@timescaledb:5432/mon?sslmode=disable"
      MON_DSN_PASSWORD_FILE: /run/secrets/db_pw
    secrets:
      - db_pw
    ports:
      # bind to loopback; expose via reverse proxy with TLS termination
      - "127.0.0.1:8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - mon-internal
      - mon-public

volumes:
  tsdb:

networks:
  mon-internal:
    internal: true
  mon-public:

secrets:
  db_pw:
    file: ./secrets/db_pw
