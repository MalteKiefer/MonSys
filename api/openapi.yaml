          description: single-use recovery codes; show once
          items:
            type: string
          type:
            - array
            - "null"
        otpauth_url:
          description: otpauth://totp/... uri compatible with most authenticators
          type: string
        qr_png_base64:
          description: PNG QR code rendering of otpauth_url
          type: string
        secret_b32:
          description: raw TOTP secret in base32 — also encoded in otpauth_url + qr
          type: string
      required:
        - secret_b32
        - otpauth_url
        - qr_png_base64
        - backup_codes
      type: object
    TOTPVerifyRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/TOTPVerifyRequest.json
          format: uri
          readOnly: true
          type: string
        code:
          description: current 6-digit TOTP, or a backup code
          maxLength: 10
          minLength: 6
          type: string
      required:
        - code
      type: object
    UserInfo:
      additionalProperties: false
      properties:
        gid:
          format: int64
          type: integer
        home:
          type: string
        is_sudoer:
          type: boolean
        is_system:
          description: uid < 1000
          type: boolean
        last_login_at:
          format: date-time
          type: string
        shell:
          type: string
        uid:
          format: int64
          type: integer
        username:
          type: string
      required:
        - username
        - uid
        - gid
        - is_sudoer
        - is_system
      type: object
    VMInfo:
      additionalProperties: false
      properties:
        autostart:
          type: boolean
        external_id:
          description: libvirt UUID or LXC name
          type: string
        kind:
          enum:
            - kvm
            - lxc
            - libvirt-lxc
          type: string
        mem_bytes:
          format: int64
          type: integer
        name:
          type: string
        state:
          description: running, paused, shut off, …
          type: string
        vcpu:
          format: int64
          type: integer
      required:
        - kind
        - external_id
        - name
        - state
        - vcpu
        - mem_bytes
        - autostart
      type: object
    VMRow:
      additionalProperties: false
      properties:
        autostart:
          type: boolean
        external_id:
          type: string
        kind:
          type: string
        last_seen_at:
          format: date-time
          type: string
        mem_bytes:
          format: int64
          type: integer
        name:
          type: string
        state:
          type: string
        vcpu:
          format: int64
          type: integer
      required:
        - kind
        - external_id
        - name
        - state
        - vcpu
        - mem_bytes
        - autostart
        - last_seen_at
      type: object
    WorkloadInfo:
      additionalProperties: false
      properties:
        external_id:
          type: string
        image:
          type: string
        kind:
          type: string
        labels:
          additionalProperties:
            type: string
          type: object
        name:
          type: string
        state:
          type: string
      required:
        - kind
        - external_id
        - name
        - state
      type: object
    WorkloadRow:
      additionalProperties: false
      properties:
        cpu_usage_pct:
          format: double
          type: number
        external_id:
          type: string
        id:
          type: string
        image:
          type: string
        kind:
          type: string
        labels:
          additionalProperties:
            type: string
          type: object
        last_seen_at:
          format: date-time
          type: string
        latest_time:
          format: date-time
          type: string
        mem_used_bytes:
          format: int64
          type: integer
        name:
          type: string
        state:
          type: string
      required:
        - id
        - kind
        - external_id
        - name
        - state
        - last_seen_at
        - cpu_usage_pct
        - mem_used_bytes
      type: object
    WorkloadSample:
      additionalProperties: false
      properties:
        block_read_bytes:
          format: int64
          type: integer
        block_write_bytes:
          format: int64
          type: integer
        cpu_usage_pct:
          format: double
          type: number
        external_id:
          type: string
        kind:
          type: string
        mem_limit_bytes:
          format: int64
          type: integer
        mem_used_bytes:
          format: int64
          type: integer
        net_rx_bytes:
          format: int64
          type: integer
        net_tx_bytes:
          format: int64
          type: integer
        state:
          type: string
        time:
          format: date-time
          type: string
      required:
        - time
        - kind
        - external_id
        - cpu_usage_pct
        - mem_used_bytes
        - mem_limit_bytes
        - net_rx_bytes
        - net_tx_bytes
        - block_read_bytes
        - block_write_bytes
        - state
      type: object
info:
  description: Self-hosted server-monitoring API. Agents push metrics; users query.
  title: mon
  version: dev
openapi: 3.1.0
paths:
  /v1/admin/logs:
    get:
      operationId: admin-server-logs
      parameters:
        - description: earliest entry time (RFC3339)
          explode: false
          in: query
          name: since
          schema:
            description: earliest entry time (RFC3339)
            format: date-time
            type: string
        - description: latest entry time (RFC3339)
          explode: false
          in: query
          name: until
          schema:
            description: latest entry time (RFC3339)
            format: date-time
            type: string
        - explode: false
          in: query
          name: level
          schema:
            enum:
              - debug
              - info
              - warn
              - error
            type: string
        - description: substring match on msg, level, or any string attr
          explode: false
          in: query
          name: q
          schema:
            description: substring match on msg, level, or any string attr
            type: string
        - description: only entries with attrs.host_id == this id
          explode: false
          in: query
          name: host_id
          schema:
            description: only entries with attrs.host_id == this id
            type: string
        - explode: false
          in: query
          name: limit
          schema:
            format: int64
            maximum: 1000
            minimum: 1
            type: integer
        - explode: false
          in: query
          name: offset
          schema:
            format: int64
            minimum: 0
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLogsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Read recent server log entries from the in-memory ring
      tags:
        - admin
  /v1/admin/security/password-policy:
    get:
      operationId: admin-get-password-policy
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordPolicy"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get the active password policy
      tags:
        - admin
    put:
      operationId: admin-set-password-policy
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordPolicy"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordPolicy"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Replace the password policy
      tags:
        - admin
  /v1/admin/users:
    get:
      operationId: admin-list-users
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List all users
      tags:
        - admin
    post:
      operationId: admin-create-user
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateUserRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCreateUserResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a user (optionally with an emailed invite)
      tags:
        - admin
  /v1/admin/users/{id}:
    delete:
      operationId: admin-delete-user
      parameters:
        - description: host UUID
          in: path
          name: id
          required: true
          schema:
            description: host UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a user
      tags:
        - admin
  /v1/admin/users/{id}/lock:
    post:
      operationId: admin-lock-user
      parameters:
        - description: host UUID
          in: path
          name: id
          required: true
          schema:
            description: host UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Lock (disable) a user
      tags:
        - admin
  /v1/admin/users/{id}/reset-2fa:
    post:
      operationId: admin-reset-2fa
      parameters:
        - description: host UUID
          in: path
          name: id
          required: true
          schema:
            description: host UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Disable a user's TOTP (forces re-enrollment)
      tags:
        - admin
  /v1/admin/users/{id}/reset-password:
    post:
      operationId: admin-reset-password
      parameters:
        - description: host UUID
          in: path
          name: id
          required: true
          schema:
            description: host UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminResetPasswordResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Issue a password-reset token (and optionally email it)
      tags:
        - admin
  /v1/admin/users/{id}/unlock:
    post:
      operationId: admin-unlock-user
      parameters:
        - description: host UUID
          in: path
          name: id
          required: true
          schema:
            description: host UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Unlock a user
      tags:
        - admin
  /v1/agents/register:
    post:
      description: "Trade a one-time bootstrap token (Authorization: Bearer …) for a per-host agent_key."
      operationId: agent-register
      parameters:
        - description: Bearer <bootstrap-token>
          in: header
          name: Authorization
          required: true
          schema:
            description: Bearer <bootstrap-token>
            type: string
        - description: caller IP, set by reverse proxy
          in: header
          name: X-Forwarded-For
          schema:
            description: caller IP, set by reverse proxy
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRegisterRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegisterResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Register a new agent
      tags:
        - agents
  /v1/auth/2fa/challenge:
    post:
      operationId: auth-2fa-challenge
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TOTPChallengeRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Complete login with a TOTP code
      tags:
        - auth
  /v1/auth/2fa/disable:
    post:
      operationId: auth-2fa-disable
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TOTPDisableRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Disable own TOTP (requires password)
      tags:
        - auth
  /v1/auth/2fa/setup:
    post:
      operationId: auth-2fa-setup
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TOTPSetupResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Begin TOTP setup; returns secret + QR + backup codes
      tags:
        - auth
  /v1/auth/2fa/verify:
    post:
      operationId: auth-2fa-verify
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TOTPVerifyRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Verify a TOTP code; activates pending TOTP if first-time
      tags:
        - auth
  /v1/auth/change-email:
    post:
      operationId: auth-change-email
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeEmailRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Change own email
      tags:
        - auth
  /v1/auth/change-password:
    post:
      operationId: auth-change-password
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Change own password
      tags:
        - auth
  /v1/auth/consume-reset:
    post:
      operationId: auth-consume-reset
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsumeResetTokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Set a new password via an admin-issued reset/invite token
      tags:
        - auth
  /v1/auth/login:
    post:
      operationId: auth-login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Exchange email+password for a session token
      tags:
        - auth
  /v1/auth/logout:
    post:
      operationId: auth-logout
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Revoke the current session
      tags:
        - auth
  /v1/auth/me:
    get:
      operationId: auth-me
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Return the authenticated user
      tags:
        - auth
  /v1/groups:
    get:
      operationId: list-groups
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGroupsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List host groups with member ids
      tags:
        - groups
    post:
      operationId: create-group
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostGroupInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostGroup"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a host group
      tags:
        - groups
  /v1/groups/{id}:
    delete:
      operationId: delete-group
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a host group
      tags:
        - groups
    put:
      operationId: update-group
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostGroupInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostGroup"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update a host group
      tags:
        - groups
  /v1/groups/{id}/members:
    put:
      operationId: set-group-members
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupMembersInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Replace group membership
      tags:
        - groups
  /v1/hosts:
    get:
      operationId: list-hosts
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListHostsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List all known hosts
      tags:
        - hosts
  /v1/hosts/{id}:
    get:
      operationId: host-detail
      parameters:
        - description: host UUID
          in: path
          name: id
          required: true
          schema:
            description: host UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostDetail"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Single host with current inventory bundles
      tags:
        - hosts
  /v1/hosts/{id}/logins:
    get:
      operationId: host-logins
      parameters:
        - description: host UUID
          in: path
          name: id
          required: true
          schema:
            description: host UUID
            type: string
        - description: earliest event timestamp (RFC3339); default = now-24h
          explode: false
          in: query
          name: since
          schema:
            description: earliest event timestamp (RFC3339); default = now-24h
            format: date-time
            type: string
        - description: max events to return (1..1000); default 200
          explode: false
          in: query
          name: limit
          schema:
            description: max events to return (1..1000); default 200
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostLoginsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Recent login/auth events for a host
      tags:
        - security
  /v1/hosts/{id}/metrics/disk:
    get:
      operationId: host-disk-metrics
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - explode: false
          in: query
          name: from
          schema:
            format: date-time
            type: string
        - explode: false
          in: query
          name: to
          schema:
            format: date-time
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskMetricsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Time-range disk samples for a host (optionally one disk)
      tags:
        - hosts
  /v1/hosts/{id}/metrics/net:
    get:
      operationId: host-net-metrics
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - explode: false
          in: query
          name: from
          schema:
            format: date-time
            type: string
        - explode: false
          in: query
          name: to
          schema:
            format: date-time
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetMetricsOutputBody"
          description: OK
        default:
          content:
