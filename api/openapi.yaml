components:
  schemas:
    AdminCreateUserRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AdminCreateUserRequest.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        password:
          description: if empty, an invite/reset token is issued and (if SMTP configured) emailed
          maxLength: 128
          type: string
          writeOnly: true
        role:
          enum:
            - admin
            - user
          type: string
        send_invite:
          type: boolean
      required:
        - email
        - role
      type: object
    AdminCreateUserResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AdminCreateUserResponse.json
          format: uri
          readOnly: true
          type: string
        invite_sent:
          type: boolean
        reset_url:
          description: manual link if invite email was not delivered
          format: uri
          maxLength: 2048
          readOnly: true
          type: string
        user:
          $ref: "#/components/schemas/AdminUserSummary"
      required:
        - user
        - invite_sent
      type: object
    AdminGetIngestOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AdminGetIngestOutputBody.json
          format: uri
          readOnly: true
          type: string
        host_id:
          type: string
        hostname:
          type: string
        payload: {}
        size_bytes:
          format: int64
          type: integer
        time:
          format: date-time
          type: string
        truncated:
          type: boolean
      required:
        - time
        - host_id
        - size_bytes
        - truncated
        - payload
      type: object
    AdminListAuditOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AdminListAuditOutputBody.json
          format: uri
          readOnly: true
          type: string
        entries:
          items:
            $ref: "#/components/schemas/AuditEntry"
          type:
            - array
            - "null"
        total:
          format: int64
          type: integer
      required:
        - entries
        - total
      type: object
    AdminListIngestsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AdminListIngestsOutputBody.json
          format: uri
          readOnly: true
          type: string
        entries:
          items:
            $ref: "#/components/schemas/IngestSummary"
          type:
            - array
            - "null"
      required:
        - entries
      type: object
    AdminLogsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AdminLogsOutputBody.json
          format: uri
          readOnly: true
          type: string
        entries:
          items:
            $ref: "#/components/schemas/Entry"
          type:
            - array
            - "null"
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        seq:
          description: monotonic write counter; gaps mean entries were dropped
          format: int64
          minimum: 0
          type: integer
        total:
          description: matching entries before paging
          format: int64
          type: integer
      required:
        - total
        - limit
        - offset
        - entries
        - seq
      type: object
    AdminResetPasswordResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AdminResetPasswordResponse.json
          format: uri
          readOnly: true
          type: string
        invite_sent:
          type: boolean
        reset_url:
          format: uri
          maxLength: 2048
          readOnly: true
          type: string
      required:
        - invite_sent
      type: object
    AdminUserSummary:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          readOnly: true
          type: string
        disabled_at:
          format: date-time
          readOnly: true
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        id:
          format: uuid
          maxLength: 36
          readOnly: true
          type: string
        last_login_at:
          format: date-time
          readOnly: true
          type: string
        role:
          enum:
            - admin
            - user
          type: string
        totp_active:
          type: boolean
      required:
        - id
        - email
        - role
        - created_at
        - totp_active
      type: object
    AgentConfig:
      additionalProperties: false
      properties:
        buffer_max_mb:
          format: int64
          maximum: 4096
          minimum: 1
          type: integer
        interval_seconds:
          format: int64
          maximum: 3600
          minimum: 5
          type: integer
        labels:
          additionalProperties:
            type: string
          type: object
        packages:
          $ref: "#/components/schemas/AgentPackagesConfig"
        quiet_hours:
          $ref: "#/components/schemas/AgentQuietHours"
        schedules:
          items:
            $ref: "#/components/schemas/AgentSchedule"
          type:
            - array
            - "null"
      type: object
    AgentConfigEntry:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AgentConfigEntry.json
          format: uri
          readOnly: true
          type: string
        config:
          $ref: "#/components/schemas/AgentConfig"
        created_at:
          format: date-time
          readOnly: true
          type: string
        description:
          maxLength: 500
          type: string
        enabled:
          type: boolean
        id:
          format: uuid
          maxLength: 36
          readOnly: true
          type: string
        scope:
          enum:
            - global
            - group
            - host
          type: string
        target_id:
          description: NULL for global
          maxLength: 64
          type: string
        target_name:
          description: hostname for host-scoped, group name for group-scoped
          maxLength: 253
          type: string
        updated_at:
          format: date-time
          readOnly: true
          type: string
        updated_by:
          maxLength: 253
          readOnly: true
          type: string
      required:
        - id
        - scope
        - config
        - enabled
        - created_at
        - updated_at
      type: object
    AgentConfigInput:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AgentConfigInput.json
          format: uri
          readOnly: true
          type: string
        config:
          $ref: "#/components/schemas/AgentConfig"
        description:
          maxLength: 500
          type: string
        enabled:
          type: boolean
        scope:
          enum:
            - global
            - group
            - host
          type: string
        target_id:
          description: required for scope=group or host
          maxLength: 64
          type: string
      required:
        - scope
        - config
        - enabled
      type: object
    AgentConfigResolved:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AgentConfigResolved.json
          format: uri
          readOnly: true
          type: string
        config:
          $ref: "#/components/schemas/AgentConfig"
        fetched_at:
          format: date-time
          type: string
        source_scopes:
          description: Which scopes contributed; useful for the agent to log on apply.
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - config
        - source_scopes
        - fetched_at
      type: object
    AgentEnrollment:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          readOnly: true
          type: string
        created_by:
          maxLength: 253
          readOnly: true
          type: string
        description:
          maxLength: 200
          type: string
        expires_at:
          format: date-time
          readOnly: true
          type: string
        group_ids:
          items:
            type: string
          type:
            - array
            - "null"
        id:
          format: uuid
          maxLength: 36
          readOnly: true
          type: string
        label:
          maxLength: 100
          type: string
        tags:
          items:
            type: string
          type:
            - array
            - "null"
        used_at:
          format: date-time
          readOnly: true
          type: string
        used_by_host_id:
          format: uuid
          maxLength: 36
          readOnly: true
          type: string
        used_by_hostname:
          maxLength: 253
          readOnly: true
          type: string
      required:
        - id
        - tags
        - group_ids
        - expires_at
        - created_at
      type: object
    AgentEnrollmentCreateResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AgentEnrollmentCreateResponse.json
          format: uri
          readOnly: true
          type: string
        enrollment:
          $ref: "#/components/schemas/AgentEnrollment"
        install_command:
          description: Single-line shell command the operator runs on the target host
          maxLength: 4096
          readOnly: true
          type: string
        install_url:
          description: URL of the installer script (token included as ?t=…)
          format: uri
          maxLength: 2048
          readOnly: true
          type: string
        token:
          description: One-shot bootstrap token. Shown once; cannot be retrieved later.
          maxLength: 128
          readOnly: true
          type: string
      required:
        - enrollment
        - token
        - install_command
        - install_url
      type: object
    AgentEnrollmentInput:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AgentEnrollmentInput.json
          format: uri
          readOnly: true
          type: string
        description:
          description: Free-form note shown in the enrollment list
          maxLength: 200
          type: string
        group_ids:
          description: Group memberships applied on first registration
          items:
            type: string
          type:
            - array
            - "null"
        label:
          description: Optional human label, displayed until the host is renamed
          maxLength: 100
          type: string
        tags:
          description: Tags applied on first registration
          items:
            type: string
          type:
            - array
            - "null"
        ttl_minutes:
          description: Token lifetime; default 30, clamped to [5, 1440]
          format: int64
          maximum: 1440
          minimum: 5
          type: integer
      type: object
    AgentPackagesConfig:
      additionalProperties: false
      properties:
        enabled:
          type: boolean
        full_snapshot_max_interval:
          description: e.g. 24h
          maxLength: 32
          type: string
        update_check_interval:
          description: e.g. 30m, 2h
          maxLength: 32
          type: string
      type: object
    AgentQuietHours:
      additionalProperties: false
      properties:
        days:
          items:
            format: int64
            type: integer
          type:
            - array
            - "null"
        enabled:
          type: boolean
        end:
          maxLength: 5
          pattern: ^([01]?[0-9]|2[0-3]):[0-5][0-9]$
          type: string
        start:
          maxLength: 5
          pattern: ^([01]?[0-9]|2[0-3]):[0-5][0-9]$
          type: string
      required:
        - enabled
        - start
        - end
      type: object
    AgentRegisterRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AgentRegisterRequest.json
          format: uri
          readOnly: true
          type: string
        agent_version:
          description: Version of mon-agent
          maxLength: 64
          type: string
        arch:
          description: GOARCH
          enum:
            - amd64
            - arm64
          examples:
            - amd64
          type: string
        cpu_cores:
          description: Logical core count
          format: int64
          type: integer
        cpu_model:
          description: Model name of CPU
          maxLength: 253
          type: string
        distro:
          description: PRETTY_NAME from os-release
          examples:
            - Ubuntu 24.04
          maxLength: 253
          type: string
        hostname:
          description: Operating-system hostname
          examples:
            - db-01
          maxLength: 253
          type: string
        kernel:
          description: uname -r
          examples:
            - 6.6.0-arch
          maxLength: 253
          type: string
        labels:
          additionalProperties:
            type: string
          description: Optional user-supplied labels
          type: object
        machine_id:
          description: Contents of /etc/machine-id
          examples:
            - a1b2c3...
          maxLength: 64
          type: string
        os:
          description: "GOOS, expected: linux"
          examples:
            - linux
          maxLength: 64
          type: string
        ram_total_bytes:
          description: Total physical memory
          format: int64
          type: integer
      required:
        - hostname
        - machine_id
        - os
        - kernel
        - arch
        - distro
        - cpu_model
        - cpu_cores
        - ram_total_bytes
        - agent_version
      type: object
    AgentRegisterResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AgentRegisterResponse.json
          format: uri
          readOnly: true
          type: string
        agent_id:
          description: UUID assigned to this host
          format: uuid
          maxLength: 36
          readOnly: true
          type: string
        agent_key:
          description: Secret key for subsequent ingest calls; show only once
          maxLength: 128
          readOnly: true
          type: string
      required:
        - agent_id
        - agent_key
      type: object
    AgentSchedule:
      additionalProperties: false
      properties:
        days:
          items:
            format: int64
            type: integer
          type:
            - array
            - "null"
        end:
          maxLength: 5
          pattern: ^([01]?[0-9]|2[0-3]):[0-5][0-9]$
          type: string
        interval_seconds:
          format: int64
          maximum: 3600
          minimum: 5
          type: integer
        name:
          maxLength: 100
          type: string
        start:
          maxLength: 5
          pattern: ^([01]?[0-9]|2[0-3]):[0-5][0-9]$
          type: string
      required:
        - name
        - start
        - end
        - interval_seconds
      type: object
    AlertHistoryEntry:
      additionalProperties: false
      properties:
        at:
          format: date-time
          readOnly: true
          type: string
        body:
          maxLength: 10000
          type: string
        dedup_key:
          maxLength: 253
          type: string
        delivered_to:
          items:
            type: string
          type:
            - array
            - "null"
        delivery_errors:
          additionalProperties: {}
          type: object
        id:
          format: int64
          readOnly: true
          type: integer
        rule_id:
          format: uuid
          maxLength: 36
          type: string
        rule_name:
          maxLength: 100
          type: string
        severity:
          enum:
            - info
            - warning
            - critical
          type: string
        subject:
          maxLength: 500
          type: string
      required:
        - id
        - at
        - rule_name
        - severity
        - subject
        - body
        - dedup_key
        - delivered_to
        - delivery_errors
      type: object
    AlertHistoryOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AlertHistoryOutputBody.json
          format: uri
          readOnly: true
          type: string
        alerts:
          items:
            $ref: "#/components/schemas/AlertHistoryEntry"
          type:
            - array
            - "null"
      required:
        - alerts
      type: object
    AuditEntry:
      additionalProperties: false
      properties:
        action:
          maxLength: 100
          type: string
        actor:
          maxLength: 253
          type: string
        at:
          format: date-time
          readOnly: true
          type: string
        detail:
          maxLength: 10000
          type: string
        id:
          format: int64
          readOnly: true
          type: integer
        target:
          maxLength: 253
          type: string
      required:
        - id
        - actor
        - action
        - target
        - detail
        - at
      type: object
    AuthConfig:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/AuthConfig.json
          format: uri
          readOnly: true
          type: string
        smtp_configured:
          description: True when the global SMTP transport has Host + FromAddress set
          type: boolean
        sso_enabled:
          description: True when an external SSO provider (e.g. Pocket-ID) is wired up
          type: boolean
      required:
        - sso_enabled
        - smtp_configured
      type: object
    Binary:
      additionalProperties: false
      properties:
        sha256:
          type: string
        url:
          type: string
      required:
        - url
        - sha256
      type: object
    ChangeEmailRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/ChangeEmailRequest.json
          format: uri
          readOnly: true
          type: string
        current_password:
          maxLength: 128
          type: string
          writeOnly: true
        new_email:
          format: email
          maxLength: 254
          type: string
      required:
        - current_password
        - new_email
      type: object
    ChangePasswordRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/ChangePasswordRequest.json
          format: uri
          readOnly: true
          type: string
        current_password:
          maxLength: 128
          type: string
          writeOnly: true
        new_password:
          maxLength: 128
          type: string
          writeOnly: true
      required:
        - current_password
        - new_password
      type: object
    ConsumeResetTokenRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/ConsumeResetTokenRequest.json
          format: uri
          readOnly: true
          type: string
        new_password:
          maxLength: 128
          type: string
          writeOnly: true
        token:
          maxLength: 128
          type: string
          writeOnly: true
      required:
        - token
        - new_password
      type: object
    CrowdsecDecision:
      additionalProperties: false
      properties:
        decision_id:
          maxLength: 64
          type: string
        origin:
          maxLength: 64
          type: string
        reason:
          maxLength: 500
          type: string
        scope:
          description: Ip, Range, Country, AS, …
          maxLength: 64
          type: string
        target:
          maxLength: 253
          type: string
        type:
          description: ban, captcha, …
          maxLength: 64
          type: string
        until:
          format: date-time
          type: string
      required:
        - decision_id
      type: object
    CurrentUser:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/CurrentUser.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          maxLength: 254
          type: string
        grace_until:
          format: date-time
          type: string
        id:
          format: uuid
          maxLength: 36
          readOnly: true
          type: string
        must_enroll:
          type: boolean
        passkey_count:
          format: int64
          type: integer
        role:
          description: admin or user
          enum:
            - admin
            - user
          type: string
        totp_active:
          type: boolean
      required:
        - id
        - email
        - role
        - totp_active
        - passkey_count
      type: object
    DiskInfo:
      additionalProperties: false
      properties:
        device:
          maxLength: 253
          type: string
        fstype:
          maxLength: 64
          type: string
        is_removable:
          type: boolean
        mountpoint:
          maxLength: 4096
          type: string
        size_bytes:
          format: int64
          type: integer
      required:
        - device
        - mountpoint
        - fstype
        - size_bytes
        - is_removable
      type: object
    DiskMetricsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/DiskMetricsOutputBody.json
          format: uri
          readOnly: true
          type: string
        devices:
          items:
            type: string
          type:
            - array
            - "null"
        from:
          format: date-time
          type: string
        host_id:
          type: string
        samples:
          items:
            $ref: "#/components/schemas/DiskSample"
          type:
            - array
            - "null"
        to:
          format: date-time
          type: string
      required:
        - host_id
        - from
        - to
        - devices
        - samples
      type: object
    DiskRow:
      additionalProperties: false
      properties:
        device:
          maxLength: 253
          type: string
        free_bytes:
          format: int64
          type: integer
        fstype:
          maxLength: 64
          type: string
        id:
          format: uuid
          maxLength: 36
          readOnly: true
          type: string
        is_removable:
          type: boolean
        last_seen_at:
          format: date-time
          readOnly: true
          type: string
        latest_time:
          format: date-time
          readOnly: true
          type: string
        mountpoint:
          maxLength: 4096
          type: string
        size_bytes:
          format: int64
          type: integer
        used_bytes:
          format: int64
          type: integer
      required:
        - id
        - device
        - mountpoint
        - fstype
        - size_bytes
        - is_removable
        - last_seen_at
        - used_bytes
        - free_bytes
      type: object
    DiskSample:
      additionalProperties: false
      properties:
        device:
          maxLength: 253
          type: string
        free_bytes:
          format: int64
          type: integer
        inodes_free:
          format: int64
          type: integer
        inodes_used:
          format: int64
          type: integer
        io_time_ms:
          format: int64
          type: integer
        mountpoint:
          maxLength: 4096
          type: string
        read_bytes:
          format: int64
          type: integer
        read_ops:
          format: int64
          type: integer
        time:
          format: date-time
          type: string
        used_bytes:
          format: int64
          type: integer
        write_bytes:
          format: int64
          type: integer
        write_ops:
          format: int64
          type: integer
      required:
        - time
        - device
        - mountpoint
        - used_bytes
        - free_bytes
        - inodes_used
        - inodes_free
        - read_bytes
        - write_bytes
        - read_ops
        - write_ops
        - io_time_ms
      type: object
    EmptyOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://mon.kiefer-networks.de/schemas/EmptyOutputBody.json
          format: uri
          readOnly: true
          type: string
        ok:
          type: boolean
      required:
        - ok
      type: object
    Entry:
      additionalProperties: false
      properties:
        attrs:
          additionalProperties: {}
          type: object
        level:
          type: string
        msg:
          type: string
        time:
          format: date-time
          type: string
      required:
        - time
        - level
        - msg
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
