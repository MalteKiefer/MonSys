info:
  description: Self-hosted server-monitoring API. Agents push metrics; users query.
  license:
    name: MIT
    url: https://github.com/MalteKiefer/MonSys/blob/main/LICENSE
  title: MonSys
  version: dev
openapi: 3.1.0
paths:
  /v1/admin/agent-config:
    get:
      operationId: list-agent-configs
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentConfigsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List all agent config rows (global + group + host)
      tags:
        - admin
    put:
      operationId: upsert-agent-config
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentConfigInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfigEntry"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create or replace an agent config row (keyed by scope+target)
      tags:
        - admin
  /v1/admin/agent-config/preview/{host_id}:
    get:
      operationId: preview-agent-config
      parameters:
        - in: path
          name: host_id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentConfigResolved"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Resolve and preview the merged config a host would receive
      tags:
        - admin
  /v1/admin/agent-config/{id}:
    delete:
      operationId: delete-agent-config
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete an agent config row
      tags:
        - admin
  /v1/admin/agents/enrollments:
    get:
      operationId: admin-list-agent-enrollments
      parameters:
        - description: page size; default 50
          explode: false
          in: query
          name: limit
          schema:
            description: page size; default 50
            format: int64
            maximum: 200
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEnrollmentsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List agent enrollments created in the last 24h
      tags:
        - agents
    post:
      operationId: admin-create-agent-enrollment
      parameters:
        - description: trusted reverse-proxy hint for canonical scheme
          in: header
          name: X-Forwarded-Proto
          schema:
            description: trusted reverse-proxy hint for canonical scheme
            type: string
        - description: trusted reverse-proxy hint for canonical host
          in: header
          name: X-Forwarded-Host
          schema:
            description: trusted reverse-proxy hint for canonical host
            type: string
        - description: raw Host header; used when no X-Forwarded-* is present
          in: header
          name: Host
          schema:
            description: raw Host header; used when no X-Forwarded-* is present
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentEnrollmentInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentEnrollmentCreateResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create a one-shot agent enrollment (returns plaintext token + install URL)
      tags:
        - agents
  /v1/admin/agents/enrollments/{id}:
    delete:
      operationId: admin-revoke-agent-enrollment
      parameters:
        - description: Enrollment UUID
          in: path
          name: id
          required: true
          schema:
            description: Enrollment UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Revoke an unused agent enrollment
      tags:
        - agents
    get:
      operationId: admin-get-agent-enrollment
      parameters:
        - description: Enrollment UUID
          in: path
          name: id
          required: true
          schema:
            description: Enrollment UUID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetEnrollmentOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get a single agent enrollment
      tags:
        - agents
  /v1/admin/audit:
    get:
      operationId: admin-list-audit
      parameters:
        - description: page size; default 100
          explode: false
          in: query
          name: limit
          schema:
            description: page size; default 100
            format: int64
            maximum: 500
            minimum: 1
            type: integer
        - description: row offset; default 0
          explode: false
          in: query
          name: offset
          schema:
            description: row offset; default 0
            format: int64
            minimum: 0
            type: integer
        - description: exact actor match (e.g. user email)
          explode: false
          in: query
          name: actor
          schema:
            description: exact actor match (e.g. user email)
            type: string
        - description: exact action match (e.g. user.create)
          explode: false
          in: query
          name: action
          schema:
            description: exact action match (e.g. user.create)
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
