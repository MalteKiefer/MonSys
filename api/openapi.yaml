components:
  schemas:
    AgentRegisterRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/AgentRegisterRequest.json
          format: uri
          readOnly: true
          type: string
        agent_version:
          description: Version of mon-agent
          type: string
        arch:
          description: GOARCH
          enum:
            - amd64
            - arm64
          examples:
            - amd64
          type: string
        cpu_cores:
          description: Logical core count
          format: int64
          type: integer
        cpu_model:
          description: Model name of CPU
          type: string
        distro:
          description: PRETTY_NAME from os-release
          examples:
            - Ubuntu 24.04
          type: string
        hostname:
          description: Operating-system hostname
          examples:
            - db-01
          type: string
        kernel:
          description: uname -r
          examples:
            - 6.6.0-arch
          type: string
        labels:
          additionalProperties:
            type: string
          description: Optional user-supplied labels
          type: object
        machine_id:
          description: Contents of /etc/machine-id
          examples:
            - a1b2c3...
          type: string
        os:
          description: "GOOS, expected: linux"
          examples:
            - linux
          type: string
        ram_total_bytes:
          description: Total physical memory
          format: int64
          type: integer
      required:
        - hostname
        - machine_id
        - os
        - kernel
        - arch
        - distro
        - cpu_model
        - cpu_cores
        - ram_total_bytes
        - agent_version
      type: object
    AgentRegisterResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/AgentRegisterResponse.json
          format: uri
          readOnly: true
          type: string
        agent_id:
          description: UUID assigned to this host
          type: string
        agent_key:
          description: Secret key for subsequent ingest calls; show only once
          type: string
      required:
        - agent_id
        - agent_key
      type: object
    CrowdsecDecision:
      additionalProperties: false
      properties:
        decision_id:
          type: string
        origin:
          type: string
        reason:
          type: string
        scope:
          description: Ip, Range, Country, AS, …
          type: string
        target:
          type: string
        type:
          description: ban, captcha, …
          type: string
        until:
          format: date-time
          type: string
      required:
        - decision_id
      type: object
    CurrentUser:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/CurrentUser.json
          format: uri
          readOnly: true
          type: string
        email:
          type: string
        id:
          type: string
        role:
          description: admin or user
          type: string
      required:
        - id
        - email
        - role
      type: object
    DiskInfo:
      additionalProperties: false
      properties:
        device:
          type: string
        fstype:
          type: string
        is_removable:
          type: boolean
        mountpoint:
          type: string
        size_bytes:
          format: int64
          type: integer
      required:
        - device
        - mountpoint
        - fstype
        - size_bytes
        - is_removable
      type: object
    DiskSample:
      additionalProperties: false
      properties:
        device:
          type: string
        free_bytes:
          format: int64
          type: integer
        inodes_free:
          format: int64
          type: integer
        inodes_used:
          format: int64
          type: integer
        io_time_ms:
          format: int64
          type: integer
        mountpoint:
          type: string
        read_bytes:
          format: int64
          type: integer
        read_ops:
          format: int64
          type: integer
        time:
          format: date-time
          type: string
        used_bytes:
          format: int64
          type: integer
        write_bytes:
          format: int64
          type: integer
        write_ops:
          format: int64
          type: integer
      required:
        - time
        - device
        - mountpoint
        - used_bytes
        - free_bytes
        - inodes_used
        - inodes_free
        - read_bytes
        - write_bytes
        - read_ops
        - write_ops
        - io_time_ms
      type: object
    EmptyOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/EmptyOutputBody.json
          format: uri
          readOnly: true
          type: string
        ok:
          type: boolean
      required:
        - ok
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    Fail2banJailInfo:
      additionalProperties: false
      properties:
        banned_ips:
          items:
            type: string
          type:
            - array
            - "null"
        currently_banned:
          format: int64
          type: integer
        currently_failed:
          format: int64
          type: integer
        jail:
          type: string
        total_banned:
          format: int64
          type: integer
        total_failed:
          format: int64
          type: integer
      required:
        - jail
        - currently_failed
        - total_failed
        - currently_banned
        - total_banned
      type: object
    FirewallStatus:
      additionalProperties: false
      properties:
        active:
          type: boolean
        default_forward:
          type: string
        default_input:
          type: string
        default_output:
          type: string
        engine:
          enum:
            - ufw
            - nftables
            - iptables
          type: string
        rule_count:
          format: int64
          type: integer
        snapshot_excerpt:
          description: First ~4 KiB of the rule dump
          type: string
      required:
        - engine
        - active
        - rule_count
      type: object
    Host:
      additionalProperties: false
      properties:
        agent_version:
          type: string
        arch:
          type: string
        cpu_cores:
          format: int64
          type: integer
        distro:
          type: string
        first_seen_at:
          format: date-time
          type: string
        hostname:
          type: string
        id:
          type: string
        labels:
          additionalProperties:
            type: string
          type: object
        last_seen_at:
          format: date-time
          type: string
        ram_total_bytes:
          format: int64
          type: integer
      required:
        - id
        - hostname
        - distro
        - arch
        - cpu_cores
        - ram_total_bytes
        - agent_version
        - first_seen_at
        - last_seen_at
        - labels
      type: object
    HostLoginsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/HostLoginsOutputBody.json
          format: uri
          readOnly: true
          type: string
        events:
          items:
            $ref: "#/components/schemas/LoginEvent"
          type:
            - array
            - "null"
        host_id:
          type: string
        since:
          format: date-time
          type: string
      required:
        - host_id
        - since
        - events
      type: object
    HostSecurityOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/HostSecurityOutputBody.json
          format: uri
          readOnly: true
          type: string
        crowdsec:
          items:
            $ref: "#/components/schemas/CrowdsecDecision"
          type:
            - array
            - "null"
        fail2ban:
          items:
            $ref: "#/components/schemas/Fail2banJailInfo"
          type:
            - array
            - "null"
        firewalls:
          items:
            $ref: "#/components/schemas/FirewallStatus"
          type:
            - array
            - "null"
        host_id:
          type: string
      required:
        - host_id
        - firewalls
        - fail2ban
        - crowdsec
      type: object
    IngestRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/IngestRequest.json
          format: uri
          readOnly: true
          type: string
        disks:
          items:
            $ref: "#/components/schemas/DiskSample"
          type:
            - array
            - "null"
        inventory:
          $ref: "#/components/schemas/InventorySnap"
          description: Present only when changed
        logins:
          description: Incremental login/auth events since previous tick
          items:
            $ref: "#/components/schemas/LoginEvent"
          type:
            - array
            - "null"
        nics:
          items:
            $ref: "#/components/schemas/NetSample"
          type:
            - array
            - "null"
        packages:
          $ref: "#/components/schemas/PackageReport"
          description: Optional package state
        security:
          $ref: "#/components/schemas/SecurityReport"
          description: Firewall, fail2ban, crowdsec snapshot
        snapshot_at:
          description: When the agent assembled this batch
          format: date-time
          type: string
        system:
          items:
            $ref: "#/components/schemas/SystemSample"
          type:
            - array
            - "null"
        workloads:
          items:
            $ref: "#/components/schemas/WorkloadSample"
          type:
            - array
            - "null"
      required:
        - snapshot_at
      type: object
    IngestResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/IngestResponse.json
          format: uri
          readOnly: true
          type: string
        accepted:
          type: boolean
        server_time:
          format: date-time
          type: string
      required:
        - accepted
        - server_time
      type: object
    InstalledPackage:
      additionalProperties: false
      properties:
        arch:
          type: string
        installed_at:
          format: date-time
          type: string
        manager:
          enum:
            - dpkg
            - rpm
            - pacman
            - apk
          type: string
        name:
          type: string
        source_repo:
          type: string
        version:
          type: string
      required:
        - manager
        - name
        - version
      type: object
    InventorySnap:
      additionalProperties: false
      properties:
        agent_version:
          type: string
        cpu_cores:
          format: int64
          type: integer
        cpu_model:
          type: string
        disks:
          items:
            $ref: "#/components/schemas/DiskInfo"
          type:
            - array
            - "null"
        distro:
          type: string
        hostname:
          type: string
        kernel:
          type: string
        labels:
          additionalProperties:
            type: string
          type: object
        nics:
          items:
            $ref: "#/components/schemas/NicInfo"
          type:
            - array
            - "null"
        ram_total_bytes:
          format: int64
          type: integer
        sources:
          description: Active collectors, e.g. docker, kubelet, proxmox
          items:
            type: string
          type:
            - array
            - "null"
        users:
          description: Local accounts from /etc/passwd
          items:
            $ref: "#/components/schemas/UserInfo"
          type:
            - array
            - "null"
        vms:
          description: libvirt/KVM domains and system LXC containers
          items:
            $ref: "#/components/schemas/VMInfo"
          type:
            - array
            - "null"
        workloads:
          items:
            $ref: "#/components/schemas/WorkloadInfo"
          type:
            - array
            - "null"
      required:
        - hostname
        - kernel
        - distro
        - agent_version
        - cpu_model
        - cpu_cores
        - ram_total_bytes
      type: object
    ListHostsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/ListHostsOutputBody.json
          format: uri
          readOnly: true
          type: string
        hosts:
          items:
            $ref: "#/components/schemas/Host"
          type:
            - array
            - "null"
      required:
        - hosts
      type: object
    LoginEvent:
      additionalProperties: false
      properties:
        detail:
          type: string
        method:
          description: ssh, login, su, sudo, …
          type: string
        source_ip:
          type: string
        success:
          type: boolean
        time:
          format: date-time
          type: string
        username:
          type: string
      required:
        - time
        - method
        - success
      type: object
    LoginRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/LoginRequest.json
          format: uri
          readOnly: true
          type: string
        email:
          description: Login email
          examples:
            - admin@example.com
          type: string
        password:
          description: Plaintext password — TLS required
          type: string
      required:
        - email
        - password
      type: object
    LoginResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/LoginResponse.json
          format: uri
          readOnly: true
          type: string
        expires_at:
          description: Session expiry (UTC)
          format: date-time
          type: string
        token:
          description: "Session token; pass as Authorization: Bearer …"
          type: string
        user:
          $ref: "#/components/schemas/CurrentUser"
      required:
        - token
        - expires_at
        - user
      type: object
    NetSample:
      additionalProperties: false
      properties:
        nic_name:
          type: string
        rx_bytes:
          format: int64
          type: integer
        rx_drops:
          format: int64
          type: integer
        rx_errs:
          format: int64
          type: integer
        rx_pkts:
          format: int64
          type: integer
        time:
          format: date-time
          type: string
        tx_bytes:
          format: int64
          type: integer
        tx_drops:
          format: int64
          type: integer
        tx_errs:
          format: int64
          type: integer
        tx_pkts:
          format: int64
          type: integer
      required:
        - time
        - nic_name
        - rx_bytes
        - tx_bytes
        - rx_pkts
        - tx_pkts
        - rx_errs
        - tx_errs
        - rx_drops
        - tx_drops
      type: object
    NicInfo:
      additionalProperties: false
      properties:
        mac:
          type: string
        name:
          type: string
        speed_mbps:
          format: int64
          type: integer
      required:
        - name
        - mac
        - speed_mbps
      type: object
    PackageReport:
      additionalProperties: false
      properties:
        installed:
          description: Full list; omit when state_hash unchanged
          items:
            $ref: "#/components/schemas/InstalledPackage"
          type:
            - array
            - "null"
        repo_states:
          items:
            $ref: "#/components/schemas/RepoMetaState"
          type:
            - array
            - "null"
        state_hash:
          description: sha256 over sorted (manager,name,version,arch); when unchanged, server may skip processing
          type: string
        summary:
          $ref: "#/components/schemas/PackageSummary"
        time:
          format: date-time
          type: string
        updates:
          items:
            $ref: "#/components/schemas/PendingUpdate"
          type:
            - array
            - "null"
      required:
        - time
        - state_hash
        - summary
      type: object
    PackageSummary:
      additionalProperties: false
      properties:
        installed_count:
          format: int64
          type: integer
        metadata_age_seconds:
          format: int64
          type: integer
        security_updates:
          format: int64
          type: integer
        updates_count:
          format: int64
          type: integer
      required:
        - installed_count
        - updates_count
        - security_updates
        - metadata_age_seconds
      type: object
    PendingUpdate:
      additionalProperties: false
      properties:
        arch:
          type: string
        available_version:
          type: string
        current_version:
          type: string
        is_security:
          type: boolean
        manager:
          enum:
            - dpkg
            - rpm
            - pacman
            - apk
          type: string
        name:
          type: string
        source_repo:
          type: string
      required:
        - manager
        - name
        - current_version
        - available_version
        - is_security
      type: object
    RepoMetaState:
      additionalProperties: false
      properties:
        manager:
          type: string
        metadata_age_seconds:
          format: int64
          type: integer
        metadata_mtime:
          format: date-time
          type: string
        refreshed_externally:
          type: boolean
      required:
        - manager
        - metadata_mtime
        - metadata_age_seconds
        - refreshed_externally
      type: object
    SecurityReport:
      additionalProperties: false
      properties:
        crowdsec:
          items:
            $ref: "#/components/schemas/CrowdsecDecision"
          type:
            - array
            - "null"
        fail2ban:
          items:
            $ref: "#/components/schemas/Fail2banJailInfo"
          type:
            - array
            - "null"
        firewalls:
          items:
            $ref: "#/components/schemas/FirewallStatus"
          type:
            - array
            - "null"
        time:
          format: date-time
          type: string
      required:
        - time
      type: object
    SysMetricsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/SysMetricsOutputBody.json
          format: uri
          readOnly: true
          type: string
        from:
          format: date-time
          type: string
        host_id:
          type: string
        samples:
          items:
            $ref: "#/components/schemas/SystemSample"
          type:
            - array
            - "null"
        to:
          format: date-time
          type: string
      required:
        - host_id
        - from
        - to
        - samples
      type: object
    SystemSample:
      additionalProperties: false
      properties:
        cpu_per_core:
          items:
            format: double
            type: number
          type:
            - array
            - "null"
        cpu_usage_pct:
          format: double
          type: number
        load_1:
          format: double
          type: number
        load_15:
          format: double
          type: number
        load_5:
          format: double
          type: number
        ram_avail_bytes:
          format: int64
          type: integer
        ram_used_bytes:
          format: int64
          type: integer
        swap_used_bytes:
          format: int64
          type: integer
        time:
          format: date-time
          type: string
        uptime_sec:
          format: int64
          type: integer
      required:
        - time
        - cpu_usage_pct
        - load_1
        - load_5
        - load_15
        - ram_used_bytes
        - ram_avail_bytes
        - swap_used_bytes
        - uptime_sec
      type: object
    UserInfo:
      additionalProperties: false
      properties:
        gid:
          format: int64
          type: integer
        home:
          type: string
        is_sudoer:
          type: boolean
        is_system:
          description: uid < 1000
          type: boolean
        last_login_at:
          format: date-time
          type: string
        shell:
          type: string
        uid:
          format: int64
          type: integer
        username:
          type: string
      required:
        - username
        - uid
        - gid
        - is_sudoer
        - is_system
      type: object
    VMInfo:
      additionalProperties: false
      properties:
        autostart:
          type: boolean
        external_id:
          description: libvirt UUID or LXC name
          type: string
        kind:
          enum:
            - kvm
            - lxc
            - libvirt-lxc
          type: string
        mem_bytes:
          format: int64
          type: integer
        name:
          type: string
        state:
          description: running, paused, shut off, …
          type: string
        vcpu:
          format: int64
          type: integer
      required:
        - kind
        - external_id
        - name
        - state
        - vcpu
        - mem_bytes
        - autostart
      type: object
    WorkloadInfo:
      additionalProperties: false
      properties:
        external_id:
          type: string
        image:
          type: string
        kind:
          type: string
        labels:
          additionalProperties:
            type: string
          type: object
        name:
          type: string
        state:
          type: string
      required:
        - kind
        - external_id
        - name
        - state
      type: object
    WorkloadSample:
      additionalProperties: false
      properties:
        block_read_bytes:
          format: int64
          type: integer
        block_write_bytes:
          format: int64
          type: integer
        cpu_usage_pct:
          format: double
          type: number
        external_id:
          type: string
        kind:
          type: string
        mem_limit_bytes:
          format: int64
          type: integer
        mem_used_bytes:
          format: int64
          type: integer
        net_rx_bytes:
          format: int64
          type: integer
        net_tx_bytes:
          format: int64
          type: integer
        state:
          type: string
        time:
          format: date-time
          type: string
      required:
        - time
        - kind
        - external_id
        - cpu_usage_pct
        - mem_used_bytes
        - mem_limit_bytes
        - net_rx_bytes
        - net_tx_bytes
        - block_read_bytes
        - block_write_bytes
        - state
      type: object
info:
  description: Self-hosted server-monitoring API. Agents push metrics; users query.
  title: mon
  version: dev
openapi: 3.1.0
paths:
  /v1/agents/register:
    post:
      description: "Trade a one-time bootstrap token (Authorization: Bearer …) for a per-host agent_key."
      operationId: agent-register
      parameters:
        - description: Bearer <bootstrap-token>
          in: header
          name: Authorization
          required: true
          schema:
            description: Bearer <bootstrap-token>
            type: string
        - description: caller IP, set by reverse proxy
          in: header
          name: X-Forwarded-For
          schema:
            description: caller IP, set by reverse proxy
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRegisterRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegisterResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Register a new agent
      tags:
        - agents
  /v1/auth/login:
    post:
      operationId: auth-login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
          description: OK
        default:
          content:
