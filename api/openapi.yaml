components:
  schemas:
    AdminCreateUserRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/AdminCreateUserRequest.json
          format: uri
          readOnly: true
          type: string
        email:
          format: email
          type: string
        password:
          description: if empty, an invite/reset token is issued and (if SMTP configured) emailed
          type: string
        role:
          enum:
            - admin
            - user
          type: string
        send_invite:
          type: boolean
      required:
        - email
        - role
      type: object
    AdminCreateUserResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/AdminCreateUserResponse.json
          format: uri
          readOnly: true
          type: string
        invite_sent:
          type: boolean
        reset_url:
          description: manual link if invite email was not delivered
          type: string
        user:
          $ref: "#/components/schemas/AdminUserSummary"
      required:
        - user
        - invite_sent
      type: object
    AdminLogsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/AdminLogsOutputBody.json
          format: uri
          readOnly: true
          type: string
        entries:
          items:
            $ref: "#/components/schemas/Entry"
          type:
            - array
            - "null"
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        seq:
          description: monotonic write counter; gaps mean entries were dropped
          format: int64
          minimum: 0
          type: integer
        total:
          description: matching entries before paging
          format: int64
          type: integer
      required:
        - total
        - limit
        - offset
        - entries
        - seq
      type: object
    AdminResetPasswordResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/AdminResetPasswordResponse.json
          format: uri
          readOnly: true
          type: string
        invite_sent:
          type: boolean
        reset_url:
          type: string
      required:
        - invite_sent
      type: object
    AdminUserSummary:
      additionalProperties: false
      properties:
        created_at:
          format: date-time
          type: string
        disabled_at:
          format: date-time
          type: string
        email:
          type: string
        id:
          type: string
        last_login_at:
          format: date-time
          type: string
        role:
          type: string
        totp_active:
          type: boolean
      required:
        - id
        - email
        - role
        - created_at
        - totp_active
      type: object
    AgentRegisterRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/AgentRegisterRequest.json
          format: uri
          readOnly: true
          type: string
        agent_version:
          description: Version of mon-agent
          type: string
        arch:
          description: GOARCH
          enum:
            - amd64
            - arm64
          examples:
            - amd64
          type: string
        cpu_cores:
          description: Logical core count
          format: int64
          type: integer
        cpu_model:
          description: Model name of CPU
          type: string
        distro:
          description: PRETTY_NAME from os-release
          examples:
            - Ubuntu 24.04
          type: string
        hostname:
          description: Operating-system hostname
          examples:
            - db-01
          type: string
        kernel:
          description: uname -r
          examples:
            - 6.6.0-arch
          type: string
        labels:
          additionalProperties:
            type: string
          description: Optional user-supplied labels
          type: object
        machine_id:
          description: Contents of /etc/machine-id
          examples:
            - a1b2c3...
          type: string
        os:
          description: "GOOS, expected: linux"
          examples:
            - linux
          type: string
        ram_total_bytes:
          description: Total physical memory
          format: int64
          type: integer
      required:
        - hostname
        - machine_id
        - os
        - kernel
        - arch
        - distro
        - cpu_model
        - cpu_cores
        - ram_total_bytes
        - agent_version
      type: object
    AgentRegisterResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/AgentRegisterResponse.json
          format: uri
          readOnly: true
          type: string
        agent_id:
          description: UUID assigned to this host
          type: string
        agent_key:
          description: Secret key for subsequent ingest calls; show only once
          type: string
      required:
        - agent_id
        - agent_key
      type: object
    AlertHistoryEntry:
      additionalProperties: false
      properties:
        at:
          format: date-time
          type: string
        body:
          type: string
        dedup_key:
          type: string
        delivered_to:
          items:
            type: string
          type:
            - array
            - "null"
        delivery_errors:
          additionalProperties: {}
          type: object
        id:
          format: int64
          type: integer
        rule_id:
          type: string
        rule_name:
          type: string
        severity:
          type: string
        subject:
          type: string
      required:
        - id
        - at
        - rule_name
        - severity
        - subject
        - body
        - dedup_key
        - delivered_to
        - delivery_errors
      type: object
    AlertHistoryOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/AlertHistoryOutputBody.json
          format: uri
          readOnly: true
          type: string
        alerts:
          items:
            $ref: "#/components/schemas/AlertHistoryEntry"
          type:
            - array
            - "null"
      required:
        - alerts
      type: object
    ChangeEmailRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/ChangeEmailRequest.json
          format: uri
          readOnly: true
          type: string
        current_password:
          type: string
        new_email:
          format: email
          type: string
      required:
        - current_password
        - new_email
      type: object
    ChangePasswordRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/ChangePasswordRequest.json
          format: uri
          readOnly: true
          type: string
        current_password:
          type: string
        new_password:
          type: string
      required:
        - current_password
        - new_password
      type: object
    ConsumeResetTokenRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/ConsumeResetTokenRequest.json
          format: uri
          readOnly: true
          type: string
        new_password:
          type: string
        token:
          type: string
      required:
        - token
        - new_password
      type: object
    CrowdsecDecision:
      additionalProperties: false
      properties:
        decision_id:
          type: string
        origin:
          type: string
        reason:
          type: string
        scope:
          description: Ip, Range, Country, AS, …
          type: string
        target:
          type: string
        type:
          description: ban, captcha, …
          type: string
        until:
          format: date-time
          type: string
      required:
        - decision_id
      type: object
    CurrentUser:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/CurrentUser.json
          format: uri
          readOnly: true
          type: string
        email:
          type: string
        id:
          type: string
        role:
          description: admin or user
          type: string
        totp_active:
          type: boolean
      required:
        - id
        - email
        - role
        - totp_active
      type: object
    DiskInfo:
      additionalProperties: false
      properties:
        device:
          type: string
        fstype:
          type: string
        is_removable:
          type: boolean
        mountpoint:
          type: string
        size_bytes:
          format: int64
          type: integer
      required:
        - device
        - mountpoint
        - fstype
        - size_bytes
        - is_removable
      type: object
    DiskMetricsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/DiskMetricsOutputBody.json
          format: uri
          readOnly: true
          type: string
        devices:
          items:
            type: string
          type:
            - array
            - "null"
        from:
          format: date-time
          type: string
        host_id:
          type: string
        samples:
          items:
            $ref: "#/components/schemas/DiskSample"
          type:
            - array
            - "null"
        to:
          format: date-time
          type: string
      required:
        - host_id
        - from
        - to
        - devices
        - samples
      type: object
    DiskRow:
      additionalProperties: false
      properties:
        device:
          type: string
        free_bytes:
          format: int64
          type: integer
        fstype:
          type: string
        id:
          type: string
        is_removable:
          type: boolean
        last_seen_at:
          format: date-time
          type: string
        latest_time:
          format: date-time
          type: string
        mountpoint:
          type: string
        size_bytes:
          format: int64
          type: integer
        used_bytes:
          format: int64
          type: integer
      required:
        - id
        - device
        - mountpoint
        - fstype
        - size_bytes
        - is_removable
        - last_seen_at
        - used_bytes
        - free_bytes
      type: object
    DiskSample:
      additionalProperties: false
      properties:
        device:
          type: string
        free_bytes:
          format: int64
          type: integer
        inodes_free:
          format: int64
          type: integer
        inodes_used:
          format: int64
          type: integer
        io_time_ms:
          format: int64
          type: integer
        mountpoint:
          type: string
        read_bytes:
          format: int64
          type: integer
        read_ops:
          format: int64
          type: integer
        time:
          format: date-time
          type: string
        used_bytes:
          format: int64
          type: integer
        write_bytes:
          format: int64
          type: integer
        write_ops:
          format: int64
          type: integer
      required:
        - time
        - device
        - mountpoint
        - used_bytes
        - free_bytes
        - inodes_used
        - inodes_free
        - read_bytes
        - write_bytes
        - read_ops
        - write_ops
        - io_time_ms
      type: object
    EmptyOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/EmptyOutputBody.json
          format: uri
          readOnly: true
          type: string
        ok:
          type: boolean
      required:
        - ok
      type: object
    Entry:
      additionalProperties: false
      properties:
        attrs:
          additionalProperties: {}
          type: object
        level:
          type: string
        msg:
          type: string
        time:
          format: date-time
          type: string
      required:
        - time
        - level
        - msg
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    Fail2banJailInfo:
      additionalProperties: false
      properties:
        banned_ips:
          items:
            type: string
          type:
            - array
            - "null"
        currently_banned:
          format: int64
          type: integer
        currently_failed:
          format: int64
          type: integer
        jail:
          type: string
        total_banned:
          format: int64
          type: integer
        total_failed:
          format: int64
          type: integer
      required:
        - jail
        - currently_failed
        - total_failed
        - currently_banned
        - total_banned
      type: object
    FirewallStatus:
      additionalProperties: false
      properties:
        active:
          type: boolean
        default_forward:
          type: string
        default_input:
          type: string
        default_output:
          type: string
        engine:
          enum:
            - ufw
            - nftables
            - iptables
          type: string
        rule_count:
          format: int64
          type: integer
        snapshot_excerpt:
          description: First ~4 KiB of the rule dump
          type: string
      required:
        - engine
        - active
        - rule_count
      type: object
    GlobalPackageRow:
      additionalProperties: false
      properties:
        arch:
          type: string
        host_id:
          type: string
        hostname:
          type: string
        installed_at:
          format: date-time
          type: string
        manager:
          type: string
        name:
          type: string
        source_repo:
          type: string
        version:
          type: string
      required:
        - host_id
        - hostname
        - manager
        - name
        - version
      type: object
    GroupMembersInput:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/GroupMembersInput.json
          format: uri
          readOnly: true
          type: string
        host_ids:
          description: Replaces the group's member set entirely
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - host_ids
      type: object
    Host:
      additionalProperties: false
      properties:
        agent_version:
          type: string
        arch:
          type: string
        cpu_cores:
          format: int64
          type: integer
        distro:
          type: string
        distro_family:
          description: arch/debian/ubuntu/fedora/rhel/alpine/suse — derived
          type: string
        first_seen_at:
          format: date-time
          type: string
        groups:
          description: Groups this host belongs to
          items:
            $ref: "#/components/schemas/HostGroupRef"
          type:
            - array
            - "null"
        hostname:
          type: string
        id:
          type: string
        labels:
          additionalProperties:
            type: string
          type: object
        last_seen_at:
          format: date-time
          type: string
        ram_total_bytes:
          format: int64
          type: integer
        services:
          description: Detected services (postgres, redis, nginx, …)
          items:
            type: string
          type:
            - array
            - "null"
        status:
          enum:
            - online
            - stale
            - offline
            - unknown
          type: string
        status_since:
          format: date-time
          type: string
        tags:
          description: Operator-set tags; managed via /v1/hosts/{id}/tags
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - id
        - hostname
        - distro
        - arch
        - cpu_cores
        - ram_total_bytes
        - agent_version
        - first_seen_at
        - last_seen_at
        - status
        - labels
        - tags
        - groups
      type: object
    HostDetail:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/HostDetail.json
          format: uri
          readOnly: true
          type: string
        disks:
          items:
            $ref: "#/components/schemas/DiskRow"
          type:
            - array
            - "null"
        host:
          $ref: "#/components/schemas/Host"
        nics:
          items:
            $ref: "#/components/schemas/NicRow"
          type:
            - array
            - "null"
        packages_summary:
          $ref: "#/components/schemas/PackageSummaryRow"
        repo_states:
          items:
            $ref: "#/components/schemas/RepoMetaState"
          type:
            - array
            - "null"
        users:
          items:
            $ref: "#/components/schemas/ObservedUser"
          type:
            - array
            - "null"
        vms:
          items:
            $ref: "#/components/schemas/VMRow"
          type:
            - array
            - "null"
        workloads:
          items:
            $ref: "#/components/schemas/WorkloadRow"
          type:
            - array
            - "null"
      required:
        - host
        - disks
        - nics
        - workloads
        - vms
        - users
        - repo_states
      type: object
    HostGroup:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/HostGroup.json
          format: uri
          readOnly: true
          type: string
        created_at:
          format: date-time
          type: string
        created_by:
          type: string
        description:
          type: string
        id:
          type: string
        member_ids:
          items:
            type: string
          type:
            - array
            - "null"
        name:
          type: string
      required:
        - id
        - name
        - created_at
        - member_ids
      type: object
    HostGroupInput:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/HostGroupInput.json
          format: uri
          readOnly: true
          type: string
        description:
          type: string
        name:
          maxLength: 100
          minLength: 1
          type: string
      required:
        - name
      type: object
    HostGroupRef:
      additionalProperties: false
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
      type: object
    HostLoginsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/HostLoginsOutputBody.json
          format: uri
          readOnly: true
          type: string
        events:
          items:
            $ref: "#/components/schemas/LoginEvent"
          type:
            - array
            - "null"
        host_id:
          type: string
        since:
          format: date-time
          type: string
      required:
        - host_id
        - since
        - events
      type: object
    HostPackageUpdatesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/HostPackageUpdatesOutputBody.json
          format: uri
          readOnly: true
          type: string
        updates:
          items:
            $ref: "#/components/schemas/PendingUpdate"
          type:
            - array
            - "null"
      required:
        - updates
      type: object
    HostPackagesOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/HostPackagesOutputBody.json
          format: uri
          readOnly: true
          type: string
        limit:
          format: int64
          type: integer
        offset:
          format: int64
          type: integer
        packages:
          items:
            $ref: "#/components/schemas/PackageRow"
          type:
            - array
            - "null"
        total:
          format: int64
          type: integer
      required:
        - total
        - limit
        - offset
        - packages
      type: object
    HostSecurityOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/HostSecurityOutputBody.json
          format: uri
          readOnly: true
          type: string
        crowdsec:
          items:
            $ref: "#/components/schemas/CrowdsecDecision"
          type:
            - array
            - "null"
        fail2ban:
          items:
            $ref: "#/components/schemas/Fail2banJailInfo"
          type:
            - array
            - "null"
        firewalls:
          items:
            $ref: "#/components/schemas/FirewallStatus"
          type:
            - array
            - "null"
        host_id:
          type: string
      required:
        - host_id
        - firewalls
        - fail2ban
        - crowdsec
      type: object
    HostTagsInput:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/HostTagsInput.json
          format: uri
          readOnly: true
          type: string
        tags:
          description: Replaces the host's tag set entirely
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - tags
      type: object
    IngestRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/IngestRequest.json
          format: uri
          readOnly: true
          type: string
        disks:
          items:
            $ref: "#/components/schemas/DiskSample"
          type:
            - array
            - "null"
        inventory:
          $ref: "#/components/schemas/InventorySnap"
          description: Present only when changed
        logins:
          description: Incremental login/auth events since previous tick
          items:
            $ref: "#/components/schemas/LoginEvent"
          type:
            - array
            - "null"
        nics:
          items:
            $ref: "#/components/schemas/NetSample"
          type:
            - array
            - "null"
        packages:
          $ref: "#/components/schemas/PackageReport"
          description: Optional package state
        security:
          $ref: "#/components/schemas/SecurityReport"
          description: Firewall, fail2ban, crowdsec snapshot
        snapshot_at:
          description: When the agent assembled this batch
          format: date-time
          type: string
        system:
          items:
            $ref: "#/components/schemas/SystemSample"
          type:
            - array
            - "null"
        workloads:
          items:
            $ref: "#/components/schemas/WorkloadSample"
          type:
            - array
            - "null"
      required:
        - snapshot_at
      type: object
    IngestResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - //schemas/IngestResponse.json
          format: uri
          readOnly: true
          type: string
        accepted:
          type: boolean
        server_time:
          format: date-time
          type: string
      required:
        - accepted
        - server_time
      type: object
    InstalledPackage:
      additionalProperties: false
      properties:
        arch:
          type: string
        installed_at:
          format: date-time
          type: string
        manager:
          enum:
            - dpkg
            - rpm
            - pacman
            - apk
          type: string
        name:
          type: string
        source_repo:
          type: string
        version:
          type: string
      required:
        - manager
        - name
        - version
      type: object
    InventorySnap:
      additionalProperties: false
      properties:
        agent_version:
          type: string
        cpu_cores:
          format: int64
          type: integer
        cpu_model:
          type: string
        disks:
          items:
            $ref: "#/components/schemas/DiskInfo"
          type:
            - array
            - "null"
        distro:
          type: string
